<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plus Packaging — Activity Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  /* ── Plus Packaging brand colours ── */
  --bg:          #f0f2f7;
  --bg-card:     #ffffff;
  --navy:        #1B3668;   /* brand blue — PLUS */
  --navy-2:      #142a52;
  --gold:        #E88B20;   /* brand orange */
  --gold-hi:     #f09830;
  --gold-dim:    rgba(232,139,32,0.12);
  --gold-border: rgba(232,139,32,0.40);
  --text:        #1B3668;
  --text-muted:  #8C9AA8;   /* brand grey — PACKAGING */
  --border:      #cdd4e4;
  --green:       #1a8c4e;
  --green-bg:    rgba(26,140,78,0.12);
  --amber:       #b87010;
  --amber-bg:    rgba(184,112,16,0.12);
  --red:         #c0251f;
  --red-bg:      rgba(192,37,31,0.10);
  --red-border:  rgba(192,37,31,0.35);
  --radius:      10px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Barlow', sans-serif;
  min-height: 100vh;
}

/* ─── HEADER ─────────────────────────────────── */
.page-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 48px;
  background: var(--navy);
  gap: 20px; flex-wrap: wrap;
}
.header-brand { display: flex; align-items: center; gap: 20px; }
.brand-section-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 18px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase;
  color: rgba(255,255,255,0.45);
}
.brand-mark { width: 12px; height: 36px; background: var(--gold); border-radius: 3px; }
.header-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 28px; font-weight: 800; letter-spacing: 4px; text-transform: uppercase;
}
.brand-plus    { color: #ffffff; }
.brand-pkg     { color: var(--text-muted); }
.brand-section { color: rgba(255,255,255,0.5); font-weight: 600; }
.header-right { display: flex; align-items: center; gap: 16px; }
.meta-chip {
  font-size: 13px; font-weight: 600; letter-spacing: 1px;
  color: rgba(255,255,255,0.6); padding: 6px 16px;
  border: 1px solid rgba(255,255,255,0.15); border-radius: 20px;
}
.save-btn {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 14px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
  background: var(--gold); color: var(--navy); border: none;
  padding: 10px 26px; border-radius: 6px; cursor: pointer;
  transition: background 0.2s;
}
.save-btn:hover { background: var(--gold-hi); }
.save-btn.saved { background: var(--green); color: #fff; }

/* ─── MONTH PACE BANNER ─────────────────────── */
.pace-banner {
  background: var(--navy-2);
  padding: 14px 48px;
  display: flex; align-items: center; gap: 28px;
  flex-wrap: wrap;
}
.pace-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
  color: rgba(255,255,255,0.5); white-space: nowrap; line-height: 1.3;
}
.pace-controls { display: flex; align-items: center; gap: 8px; }
.pace-ctrl-group { display: flex; flex-direction: column; align-items: center; gap: 3px; }
.pace-ctrl-label {
  font-size: 10px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase;
  color: rgba(255,255,255,0.4);
}
.pace-ctrl-input {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 26px; font-weight: 800; color: var(--gold-hi);
  background: rgba(255,255,255,0.07); border: 1.5px solid rgba(255,255,255,0.15);
  border-radius: 6px; text-align: center; width: 72px; padding: 4px 6px;
  outline: none; transition: border-color 0.2s;
  -moz-appearance: textfield;
}
.pace-ctrl-input::-webkit-outer-spin-button,
.pace-ctrl-input::-webkit-inner-spin-button { -webkit-appearance: none; }
.pace-ctrl-input:focus { border-color: var(--gold); }
.pace-ctrl-sep {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 28px; font-weight: 700; color: rgba(255,255,255,0.3); margin-top: 14px;
}
.pace-divider { width: 1px; height: 32px; background: rgba(255,255,255,0.12); }
.pace-stat {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 22px; font-weight: 800; color: var(--gold-hi); white-space: nowrap;
}
.pace-stat span { font-size: 14px; font-weight: 500; color: rgba(255,255,255,0.45); margin-left: 4px; }
.pace-track-wrap { flex: 1; min-width: 180px; }
.pace-track { height: 10px; background: rgba(255,255,255,0.08); border-radius: 5px; overflow: hidden; }
.pace-fill {
  height: 100%; border-radius: 5px;
  background: linear-gradient(90deg, var(--gold), var(--gold-hi));
  transition: width 0.8s ease;
}
.pace-note { font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 4px; letter-spacing: 0.5px; }

/* ─── BODY ───────────────────────────────────── */
.page-body { padding: 28px 48px 60px; }

/* ─── CARD GRID ──────────────────────────────── */
/* 3 columns normally, but cards are reordered by rank via JS */
.sp-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
}

/* ─── SP CARD ────────────────────────────────── */
.sp-card {
  background: var(--bg-card);
  border: 2px solid var(--border);
  border-radius: var(--radius); overflow: hidden;
  animation: rise 0.5s ease both;
  box-shadow: 0 2px 12px rgba(11,24,50,0.07);
  transition: box-shadow 0.2s, border-color 0.2s;
}
.sp-card:hover { box-shadow: 0 6px 24px rgba(11,24,50,0.13); }

/* rank-1 card gets a gold border */
.sp-card.rank-1-card {
  border-color: #C9A84C;
  border-width: 3px;
  animation: rise 0.5s ease both, goldPulse 2.4s ease-in-out infinite;
}

@keyframes goldPulse {
  0%   { box-shadow: 0 0 0px  0px  rgba(201,168,76,0.0),  0 2px 12px rgba(11,24,50,0.07); }
  50%  { box-shadow: 0 0 24px 7px  rgba(201,168,76,0.50), 0 6px 28px rgba(201,168,76,0.22); }
  100% { box-shadow: 0 0 0px  0px  rgba(201,168,76,0.0),  0 2px 12px rgba(11,24,50,0.07); }
}

.sp-card-accent { height: 5px; background: linear-gradient(90deg, var(--gold) 0%, var(--gold-hi) 60%, transparent 100%); }

/* ─── CARD HEADER ────────────────────────────── */
.sp-card-head {
  display: flex; align-items: center;
  padding: 16px 20px 14px; gap: 14px;
  border-bottom: 1px solid var(--border);
  background: #f6f8fc;
}
.sp-avatar {
  width: 52px; height: 52px; flex-shrink: 0;
  background: var(--navy); border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 16px; font-weight: 700; letter-spacing: 1px; color: var(--gold-hi);
}
.sp-info { flex: 1; }
.sp-code {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 30px; font-weight: 800; letter-spacing: 2px; line-height: 1; color: var(--navy);
}
.sp-subtitle { font-size: 11px; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; margin-top: 2px; }

/* ─── RANK + AVG PCT block ───────────────────── */
.sp-rank-block {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  flex-shrink: 0;
}
.sp-rank-num {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 42px; font-weight: 800; line-height: 1; color: var(--text-muted);
}
.sp-card.rank-1-card .sp-rank-num { color: #C9A84C; }  /* gold */
.sp-card.rank-2-card .sp-rank-num { color: #A0A8B4; }  /* silver */
.sp-card.rank-3-card .sp-rank-num { color: #A0674A; }  /* bronze */
.sp-card.rank-1-card .sp-card-accent {
  height: 7px;
  background: linear-gradient(90deg, #a8832a, #C9A84C, #e8d08a);
}
.sp-card.rank-1-card .sp-card-head {
  background: rgba(201,168,76,0.07);
}
.sp-rank-label {
  font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--text-muted);
}
.sp-avg-pct {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 15px; font-weight: 800;
  padding: 3px 10px; border-radius: 5px; letter-spacing: 0.5px;
}

/* ─── METRICS ────────────────────────────────── */
.metrics-grid {
  padding: 16px 20px 20px;
  display: grid; grid-template-columns: 1fr 1fr; gap: 14px 24px;
}
.metric-block {}
.metric-head {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 7px;
}
.metric-name {
  font-size: 12px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
  color: var(--text-muted);
}
.metric-nums { display: flex; align-items: baseline; gap: 4px; }
.metric-actual-input {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 22px; font-weight: 800; color: var(--navy);
  background: transparent; border: none;
  border-bottom: 2px dashed var(--border);
  width: 56px; text-align: right; outline: none; padding: 1px 0;
  transition: border-color 0.2s;
}
.metric-actual-input:focus { border-color: var(--gold); }
.metric-sep { font-size: 14px; color: #c0c8d8; }
.metric-target { font-size: 14px; color: var(--text-muted); font-weight: 600; }
.metric-pct-badge {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px; font-weight: 700;
  padding: 2px 8px; border-radius: 4px; white-space: nowrap;
}
.pct-green { background: var(--green-bg); color: var(--green); }
.pct-amber { background: var(--amber-bg); color: var(--amber); }
.pct-red   { background: var(--red-bg);   color: var(--red); border: 1px solid var(--red-border); }

.metric-track {
  height: 9px; background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 5px; overflow: hidden; position: relative;
}
.metric-fill {
  height: 100%; border-radius: 5px;
  background: linear-gradient(90deg, var(--gold), var(--gold-hi));
  width: 0%; transition: width 1s cubic-bezier(.4,0,.2,1);
}
.metric-fill.over   { background: linear-gradient(90deg, var(--green), #4ecb83); }
.metric-fill.behind { background: linear-gradient(90deg, var(--red), #e05555); }
.metric-pace-marker {
  position: absolute; top: 0; bottom: 0; width: 2px;
  background: rgba(184,32,32,0.45); pointer-events: none;
}

/* behind-pace styling */
.metric-block.is-behind .metric-name { color: var(--red); }
.metric-block.is-behind .metric-actual-input { color: var(--red); }
.metric-block.is-behind .metric-track { border-color: var(--red-border); }

.metric-na {
  font-size: 12px; color: #b0bac8; letter-spacing: 1px; text-transform: uppercase;
  display: flex; align-items: center; gap: 8px;
}
.metric-na::before { content: ''; flex: 1; height: 1px; border-top: 1px dashed var(--border); }

/* ─── FOOTER ─────────────────────────────────── */
.footer-note {
  margin-top: 28px; padding: 14px 20px;
  background: #fff; border: 1.5px solid var(--border); border-radius: var(--radius);
  font-size: 12px; color: var(--text-muted); line-height: 1.7;
}
.footer-note strong { color: var(--navy); }

@keyframes rise {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}

@media (max-width: 1400px) { .sp-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 900px) {
  .page-header, .pace-banner, .page-body { padding-left: 20px; padding-right: 20px; }
  .sp-grid { grid-template-columns: 1fr; }
  .metrics-grid { grid-template-columns: 1fr; }
}
</style>
</head>

<!-- MONTH PACE BANNER -->
<div class="pace-banner">
  <div class="pace-label">Month<br>Pace</div>
  <div class="pace-controls">
    <div class="pace-ctrl-group">
      <label class="pace-ctrl-label">Days Passed</label>
      <input class="pace-ctrl-input" id="inputDaysPassed" type="number" min="0" max="31" value="8" onchange="recalcPace()">
    </div>
    <div class="pace-ctrl-sep">/</div>
    <div class="pace-ctrl-group">
      <label class="pace-ctrl-label">Working Days</label>
      <input class="pace-ctrl-input" id="inputWorkingDays" type="number" min="1" max="31" value="20" onchange="recalcPace()">
    </div>
  </div>
  <div class="pace-divider"></div>
  <div class="pace-stat" id="paceStatPct"></div>
  <div class="pace-divider"></div>
  <div class="pace-track-wrap">
    <div class="pace-track">
      <div class="pace-fill" id="paceFill"></div>
    </div>
    <div class="pace-note" id="paceNote"></div>
  </div>
</div>

<!-- BODY -->
<div class="page-body">
  <div class="sp-grid" id="spGrid"></div>
  <div class="footer-note">
    <strong>Ranking</strong> is by average % complete across all applicable activity metrics (highest = #1).
    Metrics shown in <span style="color:var(--red);font-weight:700">red</span> are below month pace.
    The faint red line on each bar marks where you need to be today to stay on pace.
    Press <strong>SAVE</strong> to persist all values.
  </div>
</div>

<script>
const PEOPLE = [
  { id:'PP1',   targets:{ calls:320, visits:120, deals:80, appts:100, newCust:10 } },
  { id:'PP2',   targets:{ calls:320, visits:120, deals:80, appts:100, newCust:10 } },
  { id:'PP3',   targets:{ calls:320, visits:120, deals:80, appts:100, newCust:10 } },
  { id:'PP4',   targets:{ calls:320, visits:120, deals:80, appts:100, newCust:10 } },
  { id:'PP5',   targets:{ calls:128, visits:56,  deals:40, appts:40,  newCust:10 } },
  { id:'PPA/D', targets:{ calls:320, visits:0,   deals:80, appts:0,   newCust:0  } },
];

const METRIC_LABELS = { calls:'Calls', visits:'Visits', deals:'Deals', appts:'Fixed Appts', newCust:'New Customers' };
const LS_KEY = 'pp_activity_dash_v1';

function safe(id){ return id.replace(/[^a-zA-Z0-9]/g,'_'); }
function loadState(){ try{ return JSON.parse(localStorage.getItem(LS_KEY))||{}; }catch(e){ return {}; } }

/* ── Pace ── */
const pace = { passedWorking: 8, totalWorking: 20, pct: 40 };

function readPaceInputs() {
  const passed = parseInt(document.getElementById('inputDaysPassed').value) || 0;
  const total  = parseInt(document.getElementById('inputWorkingDays').value) || 1;
  pace.passedWorking = passed;
  pace.totalWorking  = total;
  pace.pct = (passed / total) * 100;
}

function recalcPace() {
  readPaceInputs();
  renderPaceBanner();
  rebuildRanksAndRefresh();
}

function renderPaceBanner() {
  document.getElementById('paceStatPct').innerHTML =
    `${pace.pct.toFixed(1)}% <span>of month</span>`;
  document.getElementById('paceFill').style.width = Math.min(pace.pct, 100) + '%';
  document.getElementById('paceNote').textContent =
    `To be on pace, each metric should be at least ${pace.pct.toFixed(0)}% complete`;
}

/* ── Average % for a person based on current input values ── */
function calcAvgPct(p) {
  const sid = safe(p.id);
  let total = 0, count = 0;
  Object.keys(METRIC_LABELS).forEach(k => {
    const tgt = p.targets[k];
    if (tgt === 0) return;
    const el = document.getElementById(`act_${sid}_${k}`);
    const val = el ? (parseInt(el.value) || 0) : 0;
    total += Math.min((val / tgt) * 100, 100);
    count++;
  });
  return count > 0 ? total / count : 0;
}

function pctClass(p) {
  if (p >= 100) return 'pct-green';
  if (p >= pace.pct) return 'pct-green';
  if (p >= pace.pct * 0.85) return 'pct-amber';
  return 'pct-red';
}

/* ── Build all cards ── */
function buildCards(state) {
  const grid = document.getElementById('spGrid');
  grid.innerHTML = '';

  PEOPLE.forEach(p => {
    const sid = safe(p.id);
    const saved = state[p.id] || {};
    const savedActuals = saved.actuals || {};

    const metricHTML = Object.entries(METRIC_LABELS).map(([k, label]) => {
      const tgt = p.targets[k];
      if (tgt === 0) {
        return `<div class="metric-block">
          <div class="metric-head"><span class="metric-name">${label}</span></div>
          <div class="metric-na">N/A</div>
        </div>`;
      }
      const act = savedActuals[k] || 0;
      const metricPct = Math.round(act / tgt * 100);
      const isBehind = metricPct < pace.pct;
      const badgeClass = act >= tgt ? 'pct-green' : (isBehind ? 'pct-red' : 'pct-amber');

      return `<div class="metric-block${isBehind ? ' is-behind' : ''}" id="mb_${sid}_${k}">
        <div class="metric-head">
          <span class="metric-name">${label}</span>
          <div class="metric-nums">
            <input class="metric-actual-input" id="act_${sid}_${k}" type="number" min="0" value="${act}"
              oninput="refreshMetric('${sid}','${k}',${tgt}); updateRankBadge('${p.id}')">
            <span class="metric-sep">/</span>
            <span class="metric-target">${tgt}</span>
            <span class="metric-pct-badge ${badgeClass}" id="mpb_${sid}_${k}">${metricPct}%</span>
          </div>
        </div>
        <div class="metric-track">
          <div class="metric-fill${act >= tgt ? ' over' : (isBehind ? ' behind' : '')}" id="mf_${sid}_${k}"></div>
          <div class="metric-pace-marker" style="left:${Math.min(pace.pct,100)}%"></div>
        </div>
      </div>`;
    }).join('');

    // Placeholder rank — will be set by updateAllRanks()
    grid.insertAdjacentHTML('beforeend', `
    <div class="sp-card" id="card_${sid}">
      <div class="sp-card-accent"></div>
      <div class="sp-card-head">
        <div class="sp-avatar">${p.id.replace('/','').slice(0,3)}</div>
        <div class="sp-info">
          <div class="sp-code">${p.id}</div>
          <div class="sp-subtitle">Salesperson</div>
        </div>
        <div class="sp-rank-block">
          <div class="sp-rank-num" id="rankNum_${sid}">—</div>
          <div class="sp-rank-label">Position</div>
          <div class="sp-avg-pct pct-amber" id="avgPct_${sid}">0%</div>
        </div>
      </div>
      <div class="metrics-grid">${metricHTML}</div>
    </div>`);
  });

  // Now set ranks based on saved values
  updateAllRanks();
}

/* ── Refresh a single metric bar ── */
function refreshMetric(sid, key, target) {
  const val = parseInt(document.getElementById(`act_${sid}_${key}`).value) || 0;
  const fill  = document.getElementById(`mf_${sid}_${key}`);
  const badge = document.getElementById(`mpb_${sid}_${key}`);
  const block = document.getElementById(`mb_${sid}_${key}`);
  if (!fill) return;
  const fillPct   = Math.min(val / target * 100, 100);
  const metricPct = Math.round(val / target * 100);
  const isBehind  = metricPct < pace.pct;
  fill.style.width = fillPct + '%';
  fill.className = 'metric-fill' + (val >= target ? ' over' : (isBehind ? ' behind' : ''));
  if (badge) {
    badge.textContent = metricPct + '%';
    badge.className = 'metric-pct-badge ' + (val >= target ? 'pct-green' : (isBehind ? 'pct-red' : 'pct-amber'));
  }
  if (block) block.classList.toggle('is-behind', isBehind);
}

/* ── Recalculate and display all ranks ── */
function updateAllRanks() {
  // Score every person
  const scores = PEOPLE.map(p => ({ p, avg: calcAvgPct(p) }));
  // Sort descending
  scores.sort((a, b) => b.avg - a.avg);

  scores.forEach(({ p, avg }, i) => {
    const sid = safe(p.id);
    const rank = i + 1;
    const numEl  = document.getElementById(`rankNum_${sid}`);
    const pctEl  = document.getElementById(`avgPct_${sid}`);
    const card   = document.getElementById(`card_${sid}`);
    if (numEl) numEl.textContent = '#' + rank;
    if (pctEl) {
      pctEl.textContent = avg.toFixed(1) + '%';
      pctEl.className = 'sp-avg-pct ' + pctClass(avg);
    }
    if (card) {
      card.classList.toggle('rank-1-card', rank === 1);
      card.classList.toggle('rank-2-card', rank === 2);
      card.classList.toggle('rank-3-card', rank === 3);
      card.style.animationDelay = (i * 0.07) + 's';
    }
  });
}

/* Convenience: update just one person's rank badge (called on input) */
function updateRankBadge(personId) {
  updateAllRanks(); // re-rank everyone since one score changed
}

/* Re-rank + refresh all bars (used after pace changes) */
function rebuildRanksAndRefresh() {
  PEOPLE.forEach(p => {
    const sid = safe(p.id);
    Object.keys(METRIC_LABELS).forEach(k => {
      if (p.targets[k] > 0) refreshMetric(sid, k, p.targets[k]);
    });
  });
  updateAllRanks();
}

/* ── Animate bars in on load ── */
function animateIn(state) {
  requestAnimationFrame(() => setTimeout(() => {
    PEOPLE.forEach(p => {
      const sid = safe(p.id);
      const saved = state[p.id] || {};
      const savedActuals = saved.actuals || {};
      Object.keys(METRIC_LABELS).forEach(k => {
        if (p.targets[k] > 0) {
          const act = savedActuals[k] || 0;
          const mf = document.getElementById(`mf_${sid}_${k}`);
          if (mf) {
            const pct = Math.min(act / p.targets[k] * 100, 100);
            mf.style.width = pct + '%';
            const isBehind = Math.round(act / p.targets[k] * 100) < pace.pct;
            mf.className = 'metric-fill' + (act >= p.targets[k] ? ' over' : (isBehind ? ' behind' : ''));
          }
        }
      });
    });
  }, 300));
}

/* ── Save ── */
function saveAll() {
  const state = { _pace: {
    daysPassed:  parseInt(document.getElementById('inputDaysPassed').value)  || 8,
    workingDays: parseInt(document.getElementById('inputWorkingDays').value) || 20
  }};
  PEOPLE.forEach(p => {
    const sid = safe(p.id);
    state[p.id] = { actuals: {} };
    Object.keys(METRIC_LABELS).forEach(k => {
      if (p.targets[k] > 0) {
        const el = document.getElementById(`act_${sid}_${k}`);
        if (el) state[p.id].actuals[k] = parseInt(el.value) || 0;
      }
    });
  });
  localStorage.setItem(LS_KEY, JSON.stringify(state));
  const btn = document.querySelector('.save-btn');
  btn.textContent = 'SAVED ✓'; btn.classList.add('saved');
  setTimeout(() => { btn.textContent = 'SAVE'; btn.classList.remove('saved'); }, 1800);
}

/* ── Init ── */
document.getElementById('dateBadge').textContent =
  new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });

const state = loadState();
if (state._pace) {
  document.getElementById('inputDaysPassed').value  = state._pace.daysPassed;
  document.getElementById('inputWorkingDays').value = state._pace.workingDays;
}
readPaceInputs();
renderPaceBanner();
buildCards(state);
animateIn(state);
document.getElementById('spGrid').addEventListener('change', () => saveAll());
</script>
